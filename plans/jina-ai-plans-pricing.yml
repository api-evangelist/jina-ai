specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Jina AI
providerId: jina-ai
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - AI
  - Embeddings
  - Reranking
  - Search
  - LLM
description: Jina AI prices its Search Foundation APIs (Embeddings, Reranker, Reader, Classifier, Segmenter,
  DeepSearch) on a token-based pay-as-you-go model. New users receive 10 million free tokens with the
  auto-generated API key; additional tokens are purchased through Stripe. API-key tier (Free / Paid
  / Premium) is determined by token balance and unlocks higher RPM, TPM, and concurrency caps. Cloud
  marketplace billing is also available via AWS SageMaker, Microsoft Azure, and Google Cloud.
sources:
  - https://jina.ai/embeddings/
  - https://jina.ai/api-dashboard/
  - https://jina.ai/reader/
  - https://jina.ai/reranker/
plans:
  - id: jina-ai-free
    name: Free API Key
    type: freemium
    description: Auto-generated API key with 10 million free tokens shared across all Jina models;
      lower tier rate limits and concurrency. Suitable for evaluation and prototyping.
    entries:
      - label: Free token grant
        name: free_tokens
        type: quota
        metric: token
        limit: 10000000
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 100 RPM
      - name: 100,000 TPM
      - name: 2 concurrent requests
      - name: All models (Embeddings, Reranker, Reader, Classifier, Segmenter, DeepSearch)
  - id: jina-ai-payg
    name: Pay-As-You-Go (token purchase)
    type: usage-based
    description: Purchase additional tokens via Stripe (credit card, Google Pay, PayPal). Pricing is
      published per model in the API Dashboard; tokens are consumed across all Jina services.
    entries:
      - label: Embeddings / Reranker / Reader tokens
        name: tokens
        type: metered
        metric: token
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: see jina.ai/api-dashboard
        userMultiplied: false
    elements:
      - name: Token balance shared across services
      - name: Models priced individually in dashboard
      - name: Stripe-managed billing
  - id: jina-ai-paid-tier
    name: Paid API Key (tier)
    type: tiered
    description: API-key tier reached at higher token balance. Unlocks higher rate limits and concurrency
      while consuming purchased tokens.
    entries:
      - label: Tier capacity
        name: paid_tier
        type: quota
        metric: token
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included with token balance
        userMultiplied: false
    elements:
      - name: 500 RPM
      - name: 2,000,000 TPM
      - name: 50 concurrent requests
  - id: jina-ai-premium-tier
    name: Premium API Key (tier)
    type: tiered
    description: Top API-key tier for high-volume production workloads.
    entries:
      - label: Tier capacity
        name: premium_tier
        type: quota
        metric: token
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included with token balance
        userMultiplied: false
    elements:
      - name: 5,000 RPM
      - name: 50,000,000 TPM
      - name: 500 concurrent requests
  - id: jina-ai-marketplace
    name: Cloud Marketplace (AWS / Azure / GCP)
    type: enterprise
    description: Billed through hyperscaler marketplaces with the same token-based metering, useful
      for committed-spend buyers.
    entries:
      - label: Marketplace subscription
        name: marketplace
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see marketplace listing
        userMultiplied: false
    elements:
      - name: AWS SageMaker
      - name: Microsoft Azure
      - name: Google Cloud
      - name: Hyperscaler procurement / billing
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
