naftiko: 1.0.0-alpha2
info:
  label: Jina AI Embeddings API — Embeddings
  description: 'Jina AI Embeddings API — Embeddings. 1 operations. Lead operation: Create embeddings. Self-contained Naftiko
    capability covering one Jina Ai business surface.'
  tags:
  - Jina Ai
  - Embeddings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JINA_AI_API_KEY: JINA_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: embeddings-embeddings
    baseUri: https://api.jina.ai/v1
    description: Jina AI Embeddings API — Embeddings business capability. Self-contained, no shared references.
    resources:
    - name: embeddings
      path: /embeddings
      operations:
      - name: createembeddings
        method: POST
        description: Create embeddings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.JINA_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: embeddings-embeddings-rest
    port: 8080
    description: REST adapter for Jina AI Embeddings API — Embeddings. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/embeddings
      name: embeddings
      description: REST surface for embeddings.
      operations:
      - method: POST
        name: createembeddings
        description: Create embeddings
        call: embeddings-embeddings.createembeddings
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: embeddings-embeddings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Jina AI Embeddings API — Embeddings. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-embeddings
      description: Create embeddings
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: embeddings-embeddings.createembeddings
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
